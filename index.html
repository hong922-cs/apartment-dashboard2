        <div id="dashboard-content" class="hidden space-y-6">
            
            <!-- 1. 요약 카드 섹션 -->

                        <span class="text-base">💰</span> 평균 거래가격

                    <span id="summary-avg" class="text-2xl font-bold text-emerald-600 mt-1">0</span>

                <div class="bg-white rounded-xl shadow-sm border border-emerald-100 p-6 flex flex-col hover:shadow-md transition-shadow">

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 차트 (2칸 차지) -->
                <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-emerald-100 p-6 flex flex-col">
                    <h2 class="text-lg font-bold text-emerald-900 mb-4 flex items-center gap-2">
                        <span>📊</span> 월별 평균 거래가격 추이
                    </h2>
                    <div class="relative flex-grow h-72 w-full">

                    </div>

                <!-- TOP 5 랭킹 (1칸 차지) -->
                <div class="lg:col-span-1 bg-white rounded-xl shadow-sm border border-emerald-100 p-6 flex flex-col">
                    <h2 class="text-lg font-bold text-emerald-900 mb-4 flex items-center gap-2">
                        <span>👑</span> 비싼 아파트 TOP 5
                    </h2>
                    <div id="top5-list" class="flex flex-col gap-3 overflow-y-auto custom-scrollbar flex-grow">

                    </div>

            <div class="bg-white rounded-xl shadow-sm border border-emerald-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-emerald-50 bg-emerald-50/50">
                    <h2 class="text-lg font-bold text-emerald-900 flex items-center gap-2">
                        <span>📝</span> 상세 거래 목록
                    </h2>
                </div>
                <div class="overflow-x-auto custom-scrollbar max-h-96">
                    <table class="min-w-full text-sm">
                        <thead class="bg-emerald-50/80 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">거래일자</th>
                                <th scope="col" class="px-6 py-3 text-left font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">아파트명</th>
                                <th scope="col" class="px-6 py-3 text-left font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">법정동</th>
                                <th scope="col" class="px-6 py-3 text-right font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">전용면적(㎡)</th>
                                <th scope="col" class="px-6 py-3 text-right font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">층</th>
                                <th scope="col" class="px-6 py-3 text-right font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">거래금액</th>

                            </tr>
                        </thead>
                        <tbody id="table-body" class="bg-white">
                            <!-- 자바스크립트를 통해 데이터가 채워집니다 -->
                        </tbody>
                    </table>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTEIynUdsh--Y6W69RDWfl5qRfTRIaOpMMQh9a45_yany5jkPN1wlHfMy07ukrUQAJorruQ8CN4Fuia/pub?gid=2058913286&single=true&output=csv";

        // 한국 통화(만원) 단위 포맷팅 함수
        function formatKoreanCurrency(amountInManwon) {
            if (isNaN(amountInManwon)) return '-';
            const amount = Math.floor(amountInManwon);
            const eok = Math.floor(amount / 10000);
            const man = amount % 10000;
            
            let result = '';
            if (eok > 0) result += `${eok}억 `;
            if (man > 0 || eok === 0) result += `${man.toLocaleString()}만원`;
            
            return result.trim();
        }

        function getYearMonth(dateStr) {
            if (!dateStr) return '알 수 없음';
            const cleanStr = dateStr.replace(/[^0-9]/g, '');
            if (cleanStr.length >= 6) {
                return `${cleanStr.substring(0, 4)}-${cleanStr.substring(4, 6)}`;
            }
            return dateStr;
        }

        let globalData = [];
        let chartInstance = null;

        function initDashboard() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    if(data.length === 0) {
                        showError("데이터가 비어있습니다.");
                        return;
                    }
                    processData(data);
                },
                error: function(err) {
                    showError("데이터를 불러오는 중 오류가 발생했습니다: " + err.message);
                }
            });
        }

        function showError(msg) {
            document.getElementById('loading-spinner').classList.add('hidden');
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.remove('hidden');
            document.getElementById('error-text').innerText = msg;
        }

        function processData(rawData) {
            globalData = [];
            const dongSet = new Set();

            rawData.forEach(row => {
                if(!row['거래일자'] || !row['거래금액(만원)']) return;

                const priceStr = row['거래금액(만원)'].toString().replace(/,/g, '');
                const price = parseInt(priceStr, 10);

                if (isNaN(price)) return;

                const dong = row['법정동'] || '-';
                if (dong !== '-') {
                    dongSet.add(dong);
                }

                globalData.push({
                    date: row['거래일자'],
                    name: row['아파트명'] || '-',
                    dong: dong,
                    area: row['전용면적(㎡)'] || '-',
                    floor: row['층'] || '-',
                    price: price,
                    year: row['건축년도'] || '-'
                });
            });

            // 필터 옵션 생성
            const dongFilter = document.getElementById('dong-filter');
            const sortedDongs = Array.from(dongSet).sort();
            
            sortedDongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                dongFilter.appendChild(option);
            });

            // 필터 이벤트 연동
            dongFilter.addEventListener('change', function(e) {
                updateDashboard(e.target.value);
            });

            updateDashboard('전체');

            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
        }

        function updateDashboard(selectedDong) {
            let totalTransactions = 0;
            let sumPrice = 0;
            let maxPrice = -Infinity;
            let minPrice = Infinity;
            
            let maxPriceApt = '';
            let minPriceApt = '';

            const monthlyData = {};
            
            const filteredData = selectedDong === '전체' 
                ? [...globalData] 
                : globalData.filter(item => item.dong === selectedDong);

            filteredData.forEach(item => {
                totalTransactions++;
                sumPrice += item.price;
                
                if (item.price > maxPrice) {
                    maxPrice = item.price;
                    maxPriceApt = `${item.name} (${item.dong})`;
                }
                if (item.price < minPrice) {
                    minPrice = item.price;
                    minPriceApt = `${item.name} (${item.dong})`;
                }

                const month = getYearMonth(item.date);
                if (!monthlyData[month]) {
                    monthlyData[month] = { sum: 0, count: 0 };
                }
                monthlyData[month].sum += item.price;
                monthlyData[month].count += 1;
            });

            const avgPrice = totalTransactions > 0 ? (sumPrice / totalTransactions) : 0;
            
            // 요약 카드 업데이트
            document.getElementById('summary-count').innerText = `${totalTransactions.toLocaleString()} 건`;
            document.getElementById('summary-avg').innerText = formatKoreanCurrency(avgPrice);
            
            if(maxPrice !== -Infinity) {
                document.getElementById('summary-max').innerText = formatKoreanCurrency(maxPrice);
                document.getElementById('summary-max-detail').innerText = maxPriceApt;
            } else {
                document.getElementById('summary-max').innerText = '-';
                document.getElementById('summary-max-detail').innerText = '-';
            }

            if(minPrice !== Infinity) {
                document.getElementById('summary-min').innerText = formatKoreanCurrency(minPrice);
                document.getElementById('summary-min-detail').innerText = minPriceApt;
            } else {
                document.getElementById('summary-min').innerText = '-';
                document.getElementById('summary-min-detail').innerText = '-';
            }

            // 컴포넌트 렌더링
            renderChart(monthlyData);
            renderTop5(filteredData);

            // 테이블 렌더링을 위해 최신 날짜순 정렬
            const tableData = [...filteredData].sort((a, b) => {
                const dateA = a.date.replace(/[^0-9]/g, '');
                const dateB = b.date.replace(/[^0-9]/g, '');
                return dateB.localeCompare(dateA); 
            });
            renderTable(tableData);
        }

        // TOP 5 렌더링 함수
        function renderTop5(data) {
            const container = document.getElementById('top5-list');
            container.innerHTML = '';

            // 거래금액 내림차순 정렬 (동점일 경우 최신 날짜 우선)
            const sortedData = [...data].sort((a, b) => {
                if (b.price !== a.price) return b.price - a.price;
                const dateA = a.date.replace(/[^0-9]/g, '');
                const dateB = b.date.replace(/[^0-9]/g, '');
                return dateB.localeCompare(dateA);
            });

            const top5 = sortedData.slice(0, 5);

            if (top5.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">데이터가 없습니다.</div>';
                return;
            }

            top5.forEach((item, index) => {
                const rank = index + 1;
                let rankStyle = '';
                
                // 순위에 따른 메달 색상 스타일링
                if (rank === 1) {
                    rankStyle = 'bg-yellow-100 text-yellow-700 border-yellow-300';
                } else if (rank === 2) {
                    rankStyle = 'bg-slate-200 text-slate-700 border-slate-300';
                } else if (rank === 3) {
                    rankStyle = 'bg-orange-100 text-orange-800 border-orange-300';
                } else {
                    rankStyle = 'bg-emerald-50 text-emerald-600 border-emerald-100';
                }

                const html = `
                    <div class="flex items-center justify-between p-3 rounded-lg border border-transparent bg-white hover:bg-emerald-50 shadow-sm border border-gray-100 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="flex items-center justify-center w-8 h-8 rounded-full border-2 font-bold text-sm shrink-0 ${rankStyle}">
                                ${rank}
                            </div>
                            <div class="flex flex-col">
                                <span class="font-bold text-gray-800 text-sm sm:text-base leading-tight">${item.name}</span>
                                <span class="text-xs text-gray-500 mt-1">${item.dong} · ${item.area}㎡ · ${item.floor}층</span>
                            </div>
                        </div>
                        <div class="font-bold text-emerald-600 text-right shrink-0 ml-2">
                            ${formatKoreanCurrency(item.price)}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Chart.js 차트 렌더링
        function renderChart(monthlyData) {
            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById('priceChart').getContext('2d');
            
            const labels = Object.keys(monthlyData).sort();
            const avgPrices = labels.map(month => {
                const item = monthlyData[month];
                return Math.round(item.sum / item.count);
            });

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래금액 (만원)',
                        data: avgPrices,
                        borderColor: 'rgb(16, 185, 129)', 
                        backgroundColor: 'rgba(16, 185, 129, 0.15)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgb(5, 150, 105)', 
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(5, 150, 105)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(6, 78, 59, 0.9)', 
                            titleColor: '#fff',
                            bodyColor: '#ecfdf5', 
                            callbacks: {
                                label: function(context) {
                                    return ' ' + formatKoreanCurrency(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return (value / 10000).toFixed(1) + '억';
                                },
                                color: 'rgb(100, 116, 139)' 
                            },
                            grid: {
                                color: '#f1f5f9'
                            }
                        },
                        x: {
                            ticks: {
                                color: 'rgb(100, 116, 139)'
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // 거래 목록 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            let html = '';

            data.forEach((item, index) => {
                const rowBgClass = index % 2 === 0 ? 'bg-white' : 'bg-emerald-50/40';
                const isHighPrice = item.price >= 50000;
                const priceTextClass = isHighPrice ? 'text-red-500 font-extrabold' : 'text-emerald-600 font-bold';

                html += `
                    <tr class="${rowBgClass} hover:!bg-emerald-100 transition-colors duration-200">
                        <td class="px-6 py-4 whitespace-nowrap text-gray-500">${item.date}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-800">${item.name}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-gray-500">${item.dong}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-gray-500">${item.area}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-gray-500">${item.floor}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right ${priceTextClass}">${formatKoreanCurrency(item.price)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-gray-500">${item.year}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // 스크립트 실행 시작
        document.addEventListener('DOMContentLoaded', initDashboard);

    </script>
</body>
</html>
