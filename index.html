<!DOCTYPE html>

<body class="bg-emerald-50/30 text-gray-800 font-sans antialiased">

    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">

        <!-- 에러 메시지 -->

            <strong class="font-bold">데이터를 불러올 수 없습니다.</strong>

        <!-- 대시보드 컨텐츠 (2단 레이아웃 그리드 적용) -->
        <div id="dashboard-content" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-4 sm:gap-6 items-start">
            
            <!-- [왼쪽 컬럼]: 요약 카드, 차트, TOP 5 랭킹 (7칸 차지) -->
            <div class="lg:col-span-7 xl:col-span-8 flex flex-col gap-4 sm:gap-6">
                
                <!-- 1. 요약 카드 섹션 -->
                <!-- 모바일: 1열 (grid-cols-1), 태블릿: 2열 (sm:grid-cols-2), 데스크톱: 4열 (xl:grid-cols-4) -->
                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-3 sm:gap-4">
                    <!-- 전체 거래 건수 -->
                    <div class="bg-white rounded-xl shadow-sm border border-emerald-100 p-4 sm:p-5 flex flex-col justify-between hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-xs sm:text-sm font-medium text-emerald-600 mb-1 block">전체 거래 건수</span>

                            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-xl sm:text-2xl shrink-0 shadow-inner">
                                🏠
                            </div>
                        </div>
                        <span class="text-[11px] sm:text-xs text-gray-400 mt-2 sm:mt-3">선택된 지역 기준</span>
                    </div>

                    <!-- 평균 거래가격 -->
                    <div class="bg-white rounded-xl shadow-sm border border-emerald-100 p-4 sm:p-5 flex flex-col justify-between hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-xs sm:text-sm font-medium text-emerald-600 mb-1 block">평균 거래가격</span>
                                <span id="summary-avg" class="text-lg sm:text-xl xl:text-2xl font-bold text-emerald-600 mt-1 block">0</span>
                            </div>
                            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-xl sm:text-2xl shrink-0 shadow-inner">
                                💰
                            </div>
                        </div>
                        <div id="summary-mom" class="mt-2 sm:mt-3 flex items-center flex-wrap gap-1">
                            <!-- 변동률 뱃지 -->
                        </div>

                    <!-- 최고 거래가격 -->
                    <div class="bg-white rounded-xl shadow-sm border border-emerald-100 p-4 sm:p-5 flex flex-col justify-between hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start">
                            <div class="truncate pr-2">
                                <span class="text-xs sm:text-sm font-medium text-emerald-600 mb-1 block">최고 거래가격</span>
                                <span id="summary-max" class="text-lg sm:text-xl xl:text-2xl font-bold text-emerald-700 mt-1 block truncate">0</span>
                            </div>
                            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-xl sm:text-2xl shrink-0 shadow-inner">
                                📈
                            </div>
                        </div>
                        <span id="summary-max-detail" class="text-[11px] sm:text-xs text-gray-500 mt-2 sm:mt-3 truncate">-</span>
                    </div>

                    <!-- 최저 거래가격 -->
                    <div class="bg-white rounded-xl shadow-sm border border-emerald-100 p-4 sm:p-5 flex flex-col justify-between hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start">
                            <div class="truncate pr-2">
                                <span class="text-xs sm:text-sm font-medium text-emerald-600 mb-1 block">최저 거래가격</span>
                                <span id="summary-min" class="text-lg sm:text-xl xl:text-2xl font-bold text-emerald-400 mt-1 block truncate">0</span>
                            </div>
                            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-emerald-50 border border-emerald-100 flex items-center justify-center text-xl sm:text-2xl shrink-0 shadow-inner">
                                📉
                            </div>

                        <span id="summary-min-detail" class="text-[11px] sm:text-xs text-gray-500 mt-2 sm:mt-3 truncate">-</span>
                    </div>
                </div>

                <!-- 2. 차트 섹션 -->
                <div class="bg-white rounded-xl shadow-sm border border-emerald-100 p-4 sm:p-6 flex flex-col">
                    <h2 class="text-base sm:text-lg font-bold text-emerald-900 mb-3 sm:mb-4 flex items-center gap-2">
                        <span>📊</span> 월별 평균 거래가격 추이
                    </h2>
                    <div class="relative h-60 sm:h-72 lg:h-80 w-full">
                        <canvas id="priceChart"></canvas>
                    </div>
                </div>

                <!-- 3. TOP 5 랭킹 섹션 -->
                <div class="bg-white rounded-xl shadow-sm border border-emerald-100 p-4 sm:p-6 flex flex-col">
                    <h2 class="text-base sm:text-lg font-bold text-emerald-900 mb-3 sm:mb-4 flex items-center gap-2">
                        <span>👑</span> 비싼 아파트 TOP 5
                    </h2>
                    <!-- 모바일/태블릿: 1열, 데스크톱(xl): 2열 -->
                    <div id="top5-list" class="grid grid-cols-1 xl:grid-cols-2 gap-2 sm:gap-3">
                        <!-- 자바스크립트를 통해 랭킹 데이터가 채워집니다 -->
                    </div>
                </div>

            </div>

            <!-- [오른쪽 컬럼]: 상세 거래 목록 테이블 (5칸 차지) -->
            <div class="lg:col-span-5 xl:col-span-4 bg-white rounded-xl shadow-sm border border-emerald-100 flex flex-col lg:sticky lg:top-6 lg:h-[calc(100vh-3rem)] min-h-[400px] sm:min-h-[500px]">
                
                <!-- 테이블 헤더 (고정) -->
                <div class="px-4 sm:px-6 py-3 sm:py-4 border-b border-emerald-50 bg-emerald-50/50 shrink-0 flex justify-between items-center">
                    <h2 class="text-base sm:text-lg font-bold text-emerald-900 flex items-center gap-2">
                        <span>📝</span> 상세 거래 목록
                    </h2>
                    <span class="text-[10px] sm:text-xs text-emerald-600 bg-emerald-100/50 px-2 py-1 rounded-full">최신 거래일자 순</span>
                </div>

                <!-- 테이블 내용 (내부 스크롤) -->
                <div class="flex-1 overflow-auto custom-scrollbar">
                    <table class="min-w-full text-xs sm:text-sm">
                        <thead class="bg-emerald-50/80 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th scope="col" class="px-3 sm:px-4 py-2 sm:py-3 text-left font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">일자/아파트</th>
                                <th scope="col" class="px-3 sm:px-4 py-2 sm:py-3 text-right font-medium text-emerald-700 uppercase tracking-wider whitespace-nowrap">거래금액/면적</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="bg-white">

                        </tbody>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTEIynUdsh--Y6W69RDWfl5qRfTRIaOpMMQh9a45_yany5jkPN1wlHfMy07ukrUQAJorruQ8CN4Fuia/pub?gid=2058913286&single=true&output=csv";

        function formatKoreanCurrency(amountInManwon) {
            if (isNaN(amountInManwon)) return '-';
            const amount = Math.floor(amountInManwon);
            const eok = Math.floor(amount / 10000);
            const man = amount % 10000;
            
            let result = '';
            if (eok > 0) result += `${eok}억 `;
            if (man > 0 || eok === 0) result += `${man.toLocaleString()}만원`;
            
            return result.trim();
        }

        function getYearMonth(dateStr) {
            if (!dateStr) return '알 수 없음';
            const cleanStr = dateStr.replace(/[^0-9]/g, '');
            if (cleanStr.length >= 6) {
                return `${cleanStr.substring(0, 4)}-${cleanStr.substring(4, 6)}`;
            }
            return dateStr;
        }

        let globalData = [];
        let chartInstance = null;

        function initDashboard() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    if(data.length === 0) {
                        showError("데이터가 비어있습니다.");
                        return;
                    }
                    processData(data);
                },
                error: function(err) {
                    showError("데이터를 불러오는 중 오류가 발생했습니다: " + err.message);
                }
            });
        }

        function showError(msg) {
            document.getElementById('loading-spinner').classList.add('hidden');
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.remove('hidden');
            document.getElementById('error-text').innerText = msg;
        }

        function processData(rawData) {
            globalData = [];
            const dongSet = new Set();

            rawData.forEach(row => {
                if(!row['거래일자'] || !row['거래금액(만원)']) return;

                const priceStr = row['거래금액(만원)'].toString().replace(/,/g, '');
                const price = parseInt(priceStr, 10);

                if (isNaN(price)) return;

                const dong = row['법정동'] || '-';
                if (dong !== '-') {
                    dongSet.add(dong);
                }

                globalData.push({
                    date: row['거래일자'],
                    name: row['아파트명'] || '-',
                    dong: dong,
                    area: row['전용면적(㎡)'] || '-',
                    floor: row['층'] || '-',
                    price: price,
                    year: row['건축년도'] || '-'
                });
            });

            const dongFilter = document.getElementById('dong-filter');
            const sortedDongs = Array.from(dongSet).sort();
            
            sortedDongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                dongFilter.appendChild(option);
            });

            dongFilter.addEventListener('change', function(e) {
                updateDashboard(e.target.value);
            });

            updateDashboard('전체');

            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
        }

        function updateDashboard(selectedDong) {
            let totalTransactions = 0;
            let sumPrice = 0;
            let maxPrice = -Infinity;
            let minPrice = Infinity;
            
            let maxPriceApt = '';
            let minPriceApt = '';

            const monthlyData = {};
            
            const filteredData = selectedDong === '전체' 
                ? [...globalData] 
                : globalData.filter(item => item.dong === selectedDong);

            filteredData.forEach(item => {
                totalTransactions++;
                sumPrice += item.price;
                
                if (item.price > maxPrice) {
                    maxPrice = item.price;
                    maxPriceApt = `${item.name} (${item.dong})`;
                }
                if (item.price < minPrice) {
                    minPrice = item.price;
                    minPriceApt = `${item.name} (${item.dong})`;
                }

                const month = getYearMonth(item.date);
                if (!monthlyData[month]) {
                    monthlyData[month] = { sum: 0, count: 0 };
                }
                monthlyData[month].sum += item.price;
                monthlyData[month].count += 1;
            });

            const avgPrice = totalTransactions > 0 ? (sumPrice / totalTransactions) : 0;
            
            // 일반 통계 업데이트
            document.getElementById('summary-count').innerText = `${totalTransactions.toLocaleString()} 건`;
            document.getElementById('summary-avg').innerText = formatKoreanCurrency(avgPrice);
            
            if(maxPrice !== -Infinity) {
                document.getElementById('summary-max').innerText = formatKoreanCurrency(maxPrice);
                document.getElementById('summary-max-detail').innerText = maxPriceApt;
            } else {
                document.getElementById('summary-max').innerText = '-';
                document.getElementById('summary-max-detail').innerText = '-';
            }

            if(minPrice !== Infinity) {
                document.getElementById('summary-min').innerText = formatKoreanCurrency(minPrice);
                document.getElementById('summary-min-detail').innerText = minPriceApt;
            } else {
                document.getElementById('summary-min').innerText = '-';
                document.getElementById('summary-min-detail').innerText = '-';
            }

            // 전월 대비 변동률 계산
            const months = Object.keys(monthlyData).sort();
            let momHtml = `<span class="text-[10px] sm:text-xs text-gray-400">데이터 부족</span>`;

            if (months.length >= 2) {
                const currentMonth = months[months.length - 1];
                const prevMonth = months[months.length - 2];

                const currentAvg = monthlyData[currentMonth].sum / monthlyData[currentMonth].count;
                const prevAvg = monthlyData[prevMonth].sum / monthlyData[prevMonth].count;

                let diffRate = 0;
                if (prevAvg > 0) {
                    diffRate = ((currentAvg - prevAvg) / prevAvg) * 100;
                }
                
                const absRate = Math.abs(diffRate).toFixed(1);

                if (diffRate > 0) {
                    momHtml = `<span class="text-[10px] sm:text-xs font-bold text-red-500 bg-red-50 px-1.5 py-0.5 rounded shadow-sm border border-red-100">▲ ${absRate}%</span> <span class="text-[9px] sm:text-[10px] text-gray-500">이전달(${prevMonth}) 대비</span>`;
                } else if (diffRate < 0) {
                    momHtml = `<span class="text-[10px] sm:text-xs font-bold text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded shadow-sm border border-blue-100">▼ ${absRate}%</span> <span class="text-[9px] sm:text-[10px] text-gray-500">이전달(${prevMonth}) 대비</span>`;
                } else {
                    momHtml = `<span class="text-[10px] sm:text-xs font-bold text-gray-500 bg-gray-50 px-1.5 py-0.5 rounded shadow-sm border border-gray-200">- 0.0%</span> <span class="text-[9px] sm:text-[10px] text-gray-500">이전달(${prevMonth}) 동일</span>`;
                }
            } else if (months.length === 1) {
                momHtml = `<span class="text-[10px] sm:text-xs text-gray-400">최근 1개월 데이터만 존재</span>`;
            }
            document.getElementById('summary-mom').innerHTML = momHtml;


            renderChart(monthlyData);
            renderTop5(filteredData);

            const tableData = [...filteredData].sort((a, b) => {
                const dateA = a.date.replace(/[^0-9]/g, '');
                const dateB = b.date.replace(/[^0-9]/g, '');
                return dateB.localeCompare(dateA); 
            });
            renderTable(tableData);
        }

        function renderTop5(data) {
            const container = document.getElementById('top5-list');
            container.innerHTML = '';

            const sortedData = [...data].sort((a, b) => {
                if (b.price !== a.price) return b.price - a.price;
                const dateA = a.date.replace(/[^0-9]/g, '');
                const dateB = b.date.replace(/[^0-9]/g, '');
                return dateB.localeCompare(dateA);
            });

            const top5 = sortedData.slice(0, 5);

            if (top5.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-8 text-sm text-gray-500">데이터가 없습니다.</div>';
                return;
            }

            top5.forEach((item, index) => {
                const rank = index + 1;
                let rankStyle = '';
                
                if (rank === 1) rankStyle = 'bg-yellow-100 text-yellow-700 border-yellow-300';
                else if (rank === 2) rankStyle = 'bg-slate-200 text-slate-700 border-slate-300';
                else if (rank === 3) rankStyle = 'bg-orange-100 text-orange-800 border-orange-300';
                else rankStyle = 'bg-emerald-50 text-emerald-600 border-emerald-100';

                const html = `
                    <div class="flex items-center justify-between p-2 sm:p-3 rounded-lg border border-transparent bg-white hover:bg-emerald-50 shadow-sm border border-gray-100 transition-colors">
                        <div class="flex items-center gap-2 sm:gap-3 overflow-hidden">
                            <div class="flex items-center justify-center w-7 h-7 sm:w-8 sm:h-8 rounded-full border-2 font-bold text-xs sm:text-sm shrink-0 ${rankStyle}">
                                ${rank}
                            </div>
                            <div class="flex flex-col truncate">
                                <span class="font-bold text-gray-800 text-xs sm:text-sm truncate">${item.name}</span>
                                <span class="text-[10px] sm:text-xs text-gray-500 mt-0.5 sm:mt-1 truncate">${item.dong} · ${item.area}㎡ · ${item.floor}층</span>
                            </div>
                        </div>
                        <div class="font-bold text-emerald-600 text-sm sm:text-base text-right shrink-0 ml-2">
                            ${formatKoreanCurrency(item.price)}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function renderChart(monthlyData) {
            if (chartInstance) chartInstance.destroy();

            const ctx = document.getElementById('priceChart').getContext('2d');
            const labels = Object.keys(monthlyData).sort();
            const avgPrices = labels.map(month => Math.round(monthlyData[month].sum / monthlyData[month].count));

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래금액 (만원)',
                        data: avgPrices,
                        borderColor: 'rgb(16, 185, 129)', 
                        backgroundColor: 'rgba(16, 185, 129, 0.15)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgb(5, 150, 105)', 
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(5, 150, 105)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(6, 78, 59, 0.9)', 
                            titleColor: '#fff',
                            bodyColor: '#ecfdf5',
                            titleFont: { size: 13 },
                            bodyFont: { size: 13 },
                            padding: 10,
                            callbacks: {
                                label: function(context) { return ' ' + formatKoreanCurrency(context.raw); }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) { return (value / 10000).toFixed(1) + '억'; },
                                color: 'rgb(100, 116, 139)',
                                font: { size: 11 }
                            },
                            grid: { color: '#f1f5f9' }
                        },
                        x: {
                            ticks: { 
                                color: 'rgb(100, 116, 139)',
                                font: { size: 11 },
                                maxRotation: 45,
                                minRotation: 45
                            },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            let html = '';

            data.forEach((item, index) => {
                const rowBgClass = index % 2 === 0 ? 'bg-white' : 'bg-emerald-50/40';
                const isHighPrice = item.price >= 50000;
                const priceTextClass = isHighPrice ? 'text-red-500 font-extrabold' : 'text-emerald-600 font-bold';

                html += `
                    <tr class="${rowBgClass} hover:!bg-emerald-100 transition-colors duration-200">
                        <td class="px-3 sm:px-4 py-2 sm:py-3 whitespace-nowrap">
                            <div class="text-[10px] sm:text-xs text-gray-500 mb-0.5">${item.date}</div>
                            <div class="font-medium text-gray-800 text-xs sm:text-sm truncate max-w-[150px] sm:max-w-[200px]">${item.name} <span class="text-[10px] sm:text-xs text-gray-400 font-normal">(${item.dong})</span></div>
                        </td>
                        <td class="px-3 sm:px-4 py-2 sm:py-3 whitespace-nowrap text-right">
                            <div class="${priceTextClass} text-sm sm:text-base mb-0.5">${formatKoreanCurrency(item.price)}</div>
                            <div class="text-[10px] sm:text-xs text-gray-500">${item.area}㎡ · ${item.floor}층 · ${item.year}년식</div>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', initDashboard);

    </script>
